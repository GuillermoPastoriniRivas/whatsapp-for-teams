services:
  api:
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /asis/api
        awslogs-stream: api
        awslogs-create-group: "true"

  ui:
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /asis/ui
        awslogs-stream: ui
        awslogs-create-group: "true"

  nginx:
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /asis/nginx
        awslogs-stream: nginx
        awslogs-create-group: "true"
