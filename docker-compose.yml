services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: hivvo-api
    restart: unless-stopped
    env_file: ./api/.env
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: "${LOG_DRIVER:-json-file}"
      options:
        awslogs-region: "${AWS_REGION:-us-east-1}"
        awslogs-group: "/asis/api"
        awslogs-stream-prefix: "api"
        awslogs-create-group: "true"
    networks:
      - hivvo

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://yourdomain.com}
    container_name: hivvo-ui
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    logging:
      driver: "${LOG_DRIVER:-json-file}"
      options:
        awslogs-region: "${AWS_REGION:-us-east-1}"
        awslogs-group: "/asis/ui"
        awslogs-stream-prefix: "ui"
        awslogs-create-group: "true"
    networks:
      - hivvo

  nginx:
    image: nginx:alpine
    container_name: hivvo-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      api:
        condition: service_healthy
      ui:
        condition: service_healthy
    logging:
      driver: "${LOG_DRIVER:-json-file}"
      options:
        awslogs-region: "${AWS_REGION:-us-east-1}"
        awslogs-group: "/asis/nginx"
        awslogs-stream-prefix: "nginx"
        awslogs-create-group: "true"
    networks:
      - hivvo

networks:
  hivvo:
    driver: bridge
